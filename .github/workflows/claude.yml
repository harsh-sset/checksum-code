name: Checksum Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  checksum:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Generate token from your custom Checksum Code GitHub App
      - name: Generate GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}

      # Debug: Check if token was generated
      - name: Debug - Check App Token
        run: |
          echo "App token generated: ${{ steps.app-token.outputs.token != '' }}"
          echo "Token length: ${#{{ steps.app-token.outputs.token }}}"
          echo "APP_ID secret exists: ${{ secrets.APP_ID != '' }}"
          echo "APP_PRIVATE_KEY secret exists: ${{ secrets.APP_PRIVATE_KEY != '' }}"

      - name: Run Checksum Code Action
        id: checksum
        uses: harsh-sset/checksum-code@v1.0.11
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ steps.app-token.outputs.token }}
          claude_args: |
            --allowedTools "Bash(bun install),Bash(bun test:*),Bash(bun run format),Bash(bun typecheck)"
            --model "claude-opus-4-1-20250805"
        # Fallback: If custom app token fails, the action will use default authentication
        continue-on-error: false
