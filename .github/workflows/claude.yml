name: Checksum Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

jobs:
  checksum:
    if: |
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
      (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      # Removed id-token: write to force custom GitHub App token usage
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # Debug: Check if GitHub Access Token is available
      - name: Debug - Check GitHub Access Token
        run: |
          echo "GitHub Access Token exists: ${{ secrets.CHECKSUM_GITHUB_TOKEN != '' }}"
          echo "Token length: ${#{{ secrets.CHECKSUM_GITHUB_TOKEN }}}"
          echo "Token starts with: ${{ secrets.CHECKSUM_GITHUB_TOKEN }}"

      - name: Run Checksum Code Action
        id: checksum
        uses: harsh-sset/checksum-code@v1.0.13
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.CHECKSUM_GITHUB_TOKEN }}
          claude_args: |
            --allowedTools "Bash(bun install),Bash(bun test:*),Bash(bun run format),Bash(bun typecheck)"
            --model "claude-opus-4-1-20250805"
        env:
          # Force the action to use the custom token by setting it as an environment variable
          OVERRIDE_GITHUB_TOKEN: ${{ secrets.CHECKSUM_GITHUB_TOKEN }}
